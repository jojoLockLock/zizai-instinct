function speak(t){
  if(!window.speechSynthesis){
    alert('您的浏览器暂不支持语音合成，请使用最新版Chrome或Safari');
    return;
  }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.85;u.pitch=1;
  speechSynthesis.speak(u);
}
// 全局委托处理speak-btn点击
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-jp]');
  if(btn){speak(btn.dataset.jp);}
});

const TOTAL=41;
const main=document.getElementById('main');
const saved=JSON.parse(localStorage.getItem('jp2026')||'{}');

function updateProgress(){
  const all=document.querySelectorAll('.ic');
  let done=0;
  all.forEach(c=>{if(c.checked)done++;});
  document.getElementById('plabel').textContent='已完成 '+done+' / '+TOTAL+' 项';
  const p=Math.round(done/TOTAL*100);
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('ppct').textContent=p+'%';
}
function saveAll(){
  const s={};
  document.querySelectorAll('.ic').forEach(c=>{s[c.dataset.id]=c.checked;});
  localStorage.setItem('jp2026',JSON.stringify(s));
}

D.forEach(r=>{
  if(r.P){
    const d=document.createElement('div');
    d.className='phase';d.textContent=r.P;main.appendChild(d);return;
  }
  const id='i'+r.n;
  const done=!!saved[id];
  const card=document.createElement('div');
  card.className='card '+r.b+(done?' done':'');
  const ls=(r.ls||[]).map(([t,u])=>`<a class="link-btn" href="${u}" target="_blank" rel="noopener">${t}</a>`).join('');
  const jp=(r.jp||[]).map(([t,l])=>`<button class="speak-btn" data-jp="${t.replace(/"/g,'&quot;')}">🔊 ${l}</button>`).join('');
  const outfitHtml=r.outfit?`<div class="outfit-bar"><strong>👗 穿搭建议：</strong>${r.outfit.replace(/\n/g,'<br>')}</div>`:'';
  const mapHtml=r.map?`<a class="map-btn" href="${r.map}" target="_blank" rel="noopener">📍 查看地图</a>`:'';
  const optsHtml=(r.opts||[]).map(o=>{const oLs=(o.ls||[]).map(([t,u])=>`<a class="link-btn" href="${u}" target="_blank" rel="noopener">${t}</a>`).join('');return `<div class="opt-item">${o.l}${oLs?`<span class="opt-btns">${oLs}</span>`:''}</div>`;}).join('');
  card.innerHTML=`<div class="chk-wrap"><input type="checkbox" class="ic" data-id="${id}"${done?' checked':''}></div>
<div class="card-body">
  <div class="card-meta"><span class="seq">${r.n}</span><span class="stage">${r.s}</span><span class="time">${r.t}</span><span class="type">${r.y}</span></div>
  <div class="item-title">${r.ti}</div>
  ${r.de?`<div class="item-detail">${r.de}</div>`:''}
  ${optsHtml?`<div class="opts-block">${optsHtml}</div>`:''}
  ${outfitHtml}
  ${mapHtml||ls||jp?`<div class="link-row">${mapHtml}${ls}${jp}</div>`:''}
  <div class="meta-row">${r.co?`<span class="cost">💰 ${r.co}</span>`:''} ${r.no?`<span class="note">${r.no}</span>`:''}</div>
</div>`;
  card.querySelector('.ic').addEventListener('change',function(){
    if(this.checked)card.classList.add('done');else card.classList.remove('done');
    saveAll();updateProgress();
  });
  main.appendChild(card);
});
updateProgress();
